name: Build and Publish Release
permissions:
  contents: write

# Two release runs uploading assets to the same tag would race; queue them
# instead (never cancel — a half-cancelled release could leave a tag with
# partial assets).
concurrency:
  group: release
  cancel-in-progress: false

# Releases are cut deliberately, never as a side effect of merging: `just
# release` stamps VERSION, commits, and pushes an annotated tag — that tag push
# is what runs this workflow. Pushes to main only run CI.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build, e.g. 0.5.0 or 0.5.0-beta.1 ("v" prefix optional). Leave empty to use the VERSION file with a -pre.<run> suffix'
        required: false
        type: string
      prerelease:
        description: 'Mark as a GitHub pre-release'
        required: false
        type: boolean
        default: true
      draft:
        description: 'Create as a draft so you can review/publish it manually'
        required: false
        type: boolean
        default: true

jobs:
  build:
    # Cross-compiling with CGO disabled means one Linux runner builds every
    # target — no per-OS matrix needed.
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Third-party actions are pinned to full commit SHAs, not tags: tags are
    # mutable, and this job runs with `contents: write` and the token that
    # publishes the release. A repointed tag on any action here could replace
    # the published binaries with something users would install unquestioningly.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history + tags so git-cliff can diff against the previous tag.
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          # Reads the Go version straight from go.mod so it never drifts.
          go-version-file: go.mod
          cache: true

      - name: Determine version
        id: version
        shell: bash
        # The version input reaches this script through env, never inline
        # ${{ }} interpolation into the script body — interpolated input is
        # how GitHub Actions script injection happens.
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
            if [ -z "$VERSION" ]; then
              # No version given: derive one from the VERSION file, suffixed with
              # the semver pre-release identifier "-pre.<run number>" so each
              # manual run gets its own, ever-incrementing version.
              VERSION="$(cat VERSION)-pre.${{ github.run_number }}"
            fi
            VERSION="${VERSION#v}"
            PRERELEASE="${{ inputs.prerelease }}"
            DRAFT="${{ inputs.draft }}"
          else
            # Tag push: v0.5.0 -> 0.5.0.
            VERSION="${GITHUB_REF_NAME#v}"
            DRAFT=false
            # Semver pre-release tags (e.g. v0.5.0-beta.1) are flagged automatically.
            if [[ "$VERSION" == *-* ]]; then PRERELEASE=true; else PRERELEASE=false; fi
          fi
          # Digits-first, semver charset, bounded length. The version is spliced
          # into asset file names and the tag, so reject anything that isn't a
          # plain version string before it reaches either.
          if ! [[ "$VERSION" =~ ^[0-9][0-9A-Za-z.+-]{0,63}$ ]]; then
            echo "::error::version '$VERSION' is not a valid release version" >&2
            exit 1
          fi
          echo "VERSION=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "TAG=v$VERSION"      >> "$GITHUB_OUTPUT"
          echo "PRERELEASE=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "DRAFT=$DRAFT"       >> "$GITHUB_OUTPUT"

      - name: Test
        # Nothing gets built or published from a commit that fails vet + tests.
        shell: bash
        run: |
          set -euo pipefail
          go vet ./...
          go test ./...

      - name: Build static binaries (all platforms)
        # CGO_ENABLED=0 links no libc -> every binary is fully static and
        # portable across distros. -trimpath drops local paths; -s -w strips
        # symbols/DWARF. Version metadata is injected into internal/buildinfo
        # via -X, from the same VERSION file `just release` stamps.
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euo pipefail
          PKG=github.com/p-arndt/compose-check-updates/internal/buildinfo
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w \
            -X ${PKG}.Version=${VERSION} \
            -X ${PKG}.Commit=${COMMIT} \
            -X ${PKG}.Date=${DATE}"

          mkdir -p dist
          # Explicit target list rather than a GOOS×GOARCH cross-product:
          # darwin has no 386 or arm (GOARM) port, and windows/arm was removed
          # in Go 1.24, so a naive product would produce build failures for
          # combinations Go doesn't support.
          for target in \
            linux/amd64 linux/arm linux/arm64 linux/386 \
            windows/amd64 windows/arm64 windows/386 \
            darwin/amd64 darwin/arm64
          do
            GOOS="${target%/*}"; GOARCH="${target#*/}"
            # Raw binaries named ccu-<os>-<arch>(.exe) — the exact names the
            # README's install instructions tell users to download. Archives
            # would break every documented one-liner.
            out="dist/ccu-${GOOS}-${GOARCH}"
            [ "$GOOS" = windows ] && out="${out}.exe"
            echo "-> building $GOOS/$GOARCH"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -trimpath -ldflags "$LDFLAGS" -o "$out" .
          done

          # Checksums over the binaries (computed before the file itself exists).
          (cd dist && sha256sum ccu-* > "ccu_${VERSION}_checksums.txt")
          ls -l dist

      - name: Generate changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          # On a tag push the tag already exists, so --latest covers it. On a
          # manual run no tag exists yet (action-gh-release creates it below),
          # so fall back to --unreleased to cover commits since the last tag.
          args: ${{ github.event_name == 'workflow_dispatch' && '--unreleased --strip all' || '--latest --strip all' }}
        env:
          OUTPUT: CHANGELOG_BODY.md

      - name: Assemble release notes
        shell: bash
        run: |
          CUR="${{ steps.version.outputs.TAG }}"
          if [ "${{ steps.version.outputs.PRERELEASE }}" = "true" ]; then
            echo "## 🧪 Pre-release $CUR" > RELEASE_NOTES.md
          else
            echo "## 🚀 Release $CUR" > RELEASE_NOTES.md
          fi
          echo "" >> RELEASE_NOTES.md
          cat CHANGELOG_BODY.md >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ steps.version.outputs.PRERELEASE }}
          draft: ${{ steps.version.outputs.DRAFT }}
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
